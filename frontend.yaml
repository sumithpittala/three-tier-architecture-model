apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html-config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Three-Tier App Dashboard</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #ffffff; text-align: center; padding-top: 50px; }
            .card { background: #2a2a2a; border-radius: 8px; padding: 20px; width: 300px; margin: 20px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
            .status { color: #4caf50; font-weight: bold; }
        </style>
    </head>
    <body>
        <h1>🚀 Three-Tier Web Architecture Dashboard</h1>
        <p>Orchestrated smoothly via local Kubernetes cluster (Minikube).</p>
        
        <div class="card">
            <h3>Frontend Tier</h3>
            <p class="status">🟢 Online (React/Nginx)</p>
        </div>
        <div class="card">
            <h3>Backend API Tier</h3>
            <p class="status">🟢 Connected (Node.js)</p>
        </div>
        <div class="card">
            <h3>Database Tier</h3>
            <p class="status">🟢 Connected (MongoDB)</p>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-ui
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html # Overwriting Nginx's default directory
      volumes:
      - name: html-volume
        configMap:
          name: frontend-html-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001